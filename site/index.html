<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phoenix Adventures</title>
    <link rel="stylesheet" href="styles.css?v=20260619-9" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Character builder alpha</p>
          <h1>Phoenix Adventures</h1>
        </div>
        <div class="topbar-actions">
          <button id="newGameButton" type="button">New Character</button>
          <button id="saveButton" type="button">Save</button>
          <button id="viewToggleButton" class="view-toggle-button" type="button" aria-label="Show character sheet" aria-pressed="false" title="Show character sheet" hidden>
            <svg class="view-toggle-icon sheet-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3h8l4 4v14H7z" />
              <path d="M15 3v5h5" />
              <path d="M10 12h6" />
              <path d="M10 16h6" />
            </svg>
            <svg class="view-toggle-icon log-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 5h14" />
              <path d="M5 10h14" />
              <path d="M5 15h10" />
              <path d="M5 20h8" />
            </svg>
          </button>
        </div>
      </header>

      <main id="gameLayout" class="game-layout">
        <section class="scene-panel" aria-label="Adventure events">
          <div id="eventLog" class="event-log" aria-live="polite"></div>
          <div id="builderPanel" class="builder-panel" hidden></div>
          <div id="choiceList" class="choice-list" aria-label="Available choices"></div>
        </section>

        <aside id="characterSheet" class="progress-panel" aria-label="Character sheet" hidden>
          <section class="progress-block">
            <div class="progress-heading">
              <h2>Character Sheet</h2>
              <span id="heroLevel">Level 1</span>
            </div>
            <dl id="sheetSummary" class="progress-list"></dl>
          </section>
        </aside>
      </main>
      <img id="logPixel" class="log-pixel" src="assets/character-pixel.svg" alt="" aria-hidden="true" />
    </div>

    <script src="adventure-data.js?v=20260619-9"></script>
    <script src="game.js?v=20260619-9"></script>
  </body>
</html>
