<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phoenix Adventures</title>
    <link rel="stylesheet" href="styles.css?v=20260619-3" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Character builder alpha</p>
          <h1>Phoenix Adventures</h1>
        </div>
        <div class="topbar-actions">
          <button id="newGameButton" type="button">New Character</button>
          <button id="saveButton" type="button">Save</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="scene-panel" aria-labelledby="sceneTitle">
          <img id="sceneImage" class="scene-image" src="assets/scene-sracs-tavern.png" alt="" />
          <div class="scene-copy">
            <p id="sceneKicker" class="eyebrow">SRAC'S</p>
            <h2 id="sceneTitle">The tavern waits at the edge of the keep.</h2>
            <p id="sceneText"></p>
          </div>
          <div id="builderPanel" class="builder-panel" hidden></div>
          <div id="choiceList" class="choice-list" aria-label="Available choices"></div>
        </section>

        <aside class="progress-panel" aria-label="Character builder progress">
          <section class="progress-block">
            <div class="progress-heading">
              <h2>Builder Progress</h2>
              <span id="heroLevel">Level 1</span>
            </div>
            <label class="name-field" for="heroName">
              <span>Character Name</span>
              <input id="heroName" maxlength="28" placeholder="Enter a name" />
            </label>
            <dl class="progress-list">
              <div>
                <dt>Race</dt>
                <dd id="identityRace">Unchosen</dd>
              </div>
              <div>
                <dt>Origin</dt>
                <dd id="identityOrigin">Undeclared</dd>
              </div>
              <div>
                <dt>Background</dt>
                <dd id="identityBackground">Unchosen</dd>
              </div>
              <div>
                <dt>Class</dt>
                <dd id="identityClass">Unregistered</dd>
              </div>
              <div>
                <dt>Gold</dt>
                <dd id="statGold">12</dd>
              </div>
            </dl>
          </section>
        </aside>
      </main>
      <img id="logPixel" class="log-pixel" src="assets/character-pixel.svg" alt="" aria-hidden="true" />
    </div>

    <script src="adventure-data.js?v=20260619-3"></script>
    <script src="game.js?v=20260619-3"></script>
  </body>
</html>
