<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phoenix Adventures</title>
    <link rel="stylesheet" href="styles.css?v=20260524-1" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Static alpha</p>
          <h1>Phoenix Adventures</h1>
        </div>
        <div class="topbar-actions">
          <button id="newGameButton" type="button">New Quest</button>
          <button id="saveButton" type="button">Save</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="scene-panel" aria-labelledby="sceneTitle">
          <img id="sceneImage" class="scene-image" src="assets/scene-sracs-tavern.png" alt="" />
          <div class="scene-copy">
            <p id="sceneKicker" class="eyebrow">SRAC'S</p>
            <h2 id="sceneTitle">The tavern waits at the edge of the keep.</h2>
            <p id="sceneText"></p>
          </div>
          <div id="choiceList" class="choice-list" aria-label="Available choices"></div>
        </section>

        <aside class="side-panel" aria-label="Adventurer sheet">
          <section class="sheet-block">
            <div class="sheet-heading">
              <h2>Adventurer</h2>
              <span id="heroLevel">Level 1</span>
            </div>
            <label class="name-field" for="heroName">
              <span>Name</span>
              <input id="heroName" maxlength="28" value="Ash" />
            </label>
            <div class="attribute-list" aria-label="Character attributes">
              <div>
                <span>Strength</span>
                <strong id="statStrength">10</strong>
              </div>
              <div>
                <span>Intelligence</span>
                <strong id="statIntelligence">10</strong>
              </div>
              <div>
                <span>Wisdom</span>
                <strong id="statWisdom">10</strong>
              </div>
              <div>
                <span>Dexterity</span>
                <strong id="statDexterity">10</strong>
              </div>
              <div>
                <span>Constitution</span>
                <strong id="statConstitution">10</strong>
              </div>
              <div>
                <span>Charisma</span>
                <strong id="statCharisma">10</strong>
              </div>
            </div>
            <div class="vital-list" aria-label="Combat stats">
              <div>
                <span>Armor Class</span>
                <strong id="armorClass">10</strong>
              </div>
              <div>
                <span>Hit Points</span>
                <strong id="hitPoints">8/8</strong>
              </div>
              <div>
                <span>Gold</span>
                <strong id="statGold">8</strong>
              </div>
            </div>
          </section>

          <section class="sheet-block">
            <h2>Inventory</h2>
            <ul id="inventoryList" class="token-list"></ul>
          </section>
        </aside>
      </main>
    </div>

    <script src="adventure-data.js?v=20260524-1"></script>
    <script src="game.js?v=20260524-1"></script>
  </body>
</html>
