<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phoenix Adventures</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" />
    <link rel="stylesheet" href="styles.css?v=20260620-9" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen" aria-labelledby="loginTitle">
      <form id="loginForm" class="login-card">
        <p class="eyebrow">Player login</p>
        <h1 id="loginTitle">Phoenix Adventures</h1>
        <label class="login-field" for="playerNameEntry">
          <span>Player Name</span>
          <input id="playerNameEntry" name="playerName" type="text" autocomplete="username" required />
        </label>
        <label class="login-field" for="playerPasswordEntry">
          <span>Password</span>
          <input id="playerPasswordEntry" name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="loginError" class="login-error" role="alert" aria-live="polite"></p>
        <button id="loginButton" type="submit">Enter</button>
      </form>
    </section>

    <div id="appShell" class="app-shell" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">Character builder alpha</p>
          <h1>Phoenix Adventures</h1>
        </div>
        <div class="topbar-actions">
          <span id="playerBadge" class="player-badge"></span>
          <button id="newGameButton" type="button">New Character</button>
          <button id="saveButton" type="button">Save</button>
          <button id="logoutButton" type="button">Log Out</button>
        </div>
      </header>

      <main id="gameLayout" class="game-layout">
        <section class="scene-panel" aria-label="Adventure events">
          <div id="eventLog" class="event-log" aria-live="polite"></div>
          <div id="builderPanel" class="builder-panel" hidden></div>
          <div id="choiceList" class="choice-list" aria-label="Available choices"></div>
        </section>

        <aside id="characterSheet" class="progress-panel" aria-label="Character sheet" hidden>
          <section class="progress-block">
            <div class="progress-heading">
              <h2>Character Sheet</h2>
              <span id="heroLevel">Level 1</span>
            </div>
            <dl id="sheetSummary" class="progress-list"></dl>
          </section>
        </aside>

        <button id="viewToggleButton" class="sheet-drawer-toggle" type="button" aria-label="Open character sheet" aria-expanded="false" title="Open character sheet" hidden>
          <svg class="drawer-chevron open-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 6l-6 6 6 6" />
          </svg>
          <svg class="drawer-chevron close-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 6l6 6-6 6" />
          </svg>
        </button>
      </main>
      <img id="logPixel" class="log-pixel" src="assets/character-pixel.svg" alt="" aria-hidden="true" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script src="adventure-data.js?v=20260620-9"></script>
    <script src="game.js?v=20260620-9"></script>
  </body>
</html>
