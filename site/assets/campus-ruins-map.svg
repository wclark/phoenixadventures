  <g fill="#31442f" opacity="0.85">
    <circle cx="230" cy="258" r="24" />
    <circle cx="248" cy="312" r="19" />
    <circle cx="216" cy="468" r="22" />
    <circle cx="980" cy="166" r="25" />
    <circle cx="1064" cy="430" r="28" />
    <circle cx="884" cy="566" r="19" />
    <circle cx="508" cy="166" r="18" />
