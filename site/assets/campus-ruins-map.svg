  <g fill="#2d1d17" opacity="0.92" font-family="Georgia, serif">
    <text x="88" y="74" font-size="38">Falconrise Keep</text>
    <text x="94" y="105" font-size="18">fictionalized, not to scale</text>
    <text x="368" y="258" font-size="22" transform="rotate(-8 368 258)">Falcon Hall</text>
    <text x="670" y="236" font-size="20" transform="rotate(7 670 236)">Broken Arcades</text>
    <text x="470" y="388" font-size="21" transform="rotate(3 470 388)">Ash Court</text>
    <text x="742" y="354" font-size="18">Charter Spire</text>
    <text x="590" y="529" font-size="20">Tournament Oval</text>
